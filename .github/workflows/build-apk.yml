name: Build APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx --yes cap add android

      - name: Generate launcher icon (best-effort)
        run: npx --yes @capacitor/assets generate --android || echo "using default icon"

      - name: Sync web assets
        run: npx --yes cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk saras-luck.apk

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: saras-luck-apk
          path: saras-luck.apk

      - name: Publish to a release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Sara's Luck (Android)"
          files: saras-luck.apk
          body: |
            Latest Sara's Luck debug APK.
            Download **saras-luck.apk**, tap it on your phone, allow "install from unknown apps", and install.
