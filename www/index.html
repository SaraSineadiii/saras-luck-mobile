<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#3DAA72">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sara's Luck</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='10' width='80' height='80' rx='20' fill='%233DAA72'/%3E%3Cg fill='%23fff'%3E%3Ccircle cx='32' cy='32' r='8'/%3E%3Ccircle cx='68' cy='32' r='8'/%3E%3Ccircle cx='50' cy='50' r='8'/%3E%3Ccircle cx='32' cy='68' r='8'/%3E%3Ccircle cx='68' cy='68' r='8'/%3E%3C/g%3E%3C/svg%3E">
<style>
  :root{--bg:#F2F9F5;--card:#ECF7F0;--panel:#E4F4EA;--bg-input:#F8FDF9;--line:rgba(30,130,70,0.16);--line2:rgba(30,130,70,0.30);--pink:#3DAA72;--deep:#267A52;--plum:#0F2218;--muted:#66987A;--gold:#e0a92e;--red:#d4342a;--good:#2f9d6b;--glow:rgba(61,170,114,0.22);--grad-top:#5BC98D;--grad-bot:#2E9A63;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--plum);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.5;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 48px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .logo{width:46px;height:46px;flex:0 0 auto;border-radius:14px;background:linear-gradient(180deg,var(--grad-top),var(--grad-bot));display:grid;place-items:center;box-shadow:0 3px 12px var(--glow),inset 0 2px 4px rgba(255,255,255,.4),inset 0 -2px 4px rgba(0,0,0,.08)}
  .logo svg{width:30px;height:30px}
  h1{font-size:26px;margin:0;font-weight:800;color:var(--deep);letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:12px;margin:2px 0 0}
  .status{font-size:11px;color:var(--muted);margin:8px 2px 0;min-height:14px}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-top:16px;box-shadow:0 4px 16px var(--glow),inset 0 1px 0 rgba(255,255,255,.55)}
  .ct{display:flex;align-items:baseline;justify-content:space-between}
  .game{font-size:19px;font-weight:800;color:var(--deep)}
  .matrix{font-size:11px;color:var(--muted)}
  .method{font-size:10.5px;color:var(--muted);margin-top:1px}
  .count{margin:12px 0 4px;background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:10px;text-align:center;box-shadow:inset 0 1px 3px rgba(30,130,70,.06)}
  .count .lbl{font-size:10px;letter-spacing:.8px;color:var(--pink);font-weight:700;text-transform:uppercase}
  .clock{font-size:23px;font-weight:800;color:var(--plum);font-variant-numeric:tabular-nums;margin-top:2px}
  .jrow{display:flex;justify-content:space-between;margin-top:11px;font-size:13.5px}
  .jrow .k{color:var(--muted)}.jrow .v{font-weight:700}
  .net{margin-top:11px;background:linear-gradient(180deg,#EAF7EF,var(--bg-input));border:1.5px dashed var(--line2);border-radius:12px;padding:11px 13px}
  .net .big{font-size:22px;font-weight:800;color:var(--deep)}
  .net .cap{font-size:10.5px;color:var(--muted)}
  .ticket{margin-top:14px}
  .ticket h4{margin:0 0 7px;font-size:11px;letter-spacing:.4px;color:var(--pink);text-transform:uppercase;font-weight:700}
  .balls{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .ball{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:16px;background:#ffffff;border:1.5px solid var(--line);color:#183a28;box-shadow:0 2px 5px var(--glow),inset 0 1px 0 rgba(255,255,255,.7)}
  .ball.red{background:var(--red);color:#fff;border-color:#a5261e}
  .ball.gold{background:var(--gold);color:#3a2c07;border-color:#b8871c}
  .plus{color:var(--muted);font-size:19px;margin:0 1px}
  .tag{font-size:11px;color:var(--muted);margin-top:6px}
  .lastwin{margin:12px 0 4px;background:linear-gradient(180deg,#F3FBF6,var(--bg-input));border:1.5px solid var(--line2);border-radius:12px;padding:11px 12px}
  .lwlbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--deep);font-weight:700;margin-bottom:7px}
  .lwdate{font-weight:700;color:var(--pink)}
  .lwoutcome{margin-top:8px;font-size:12px;font-weight:700;color:var(--deep);background:var(--panel);border:1.5px solid var(--line);border-radius:9px;padding:7px 9px}
  .lwoutcome.won{background:#fff6e0;border-color:#ffdf9e;color:#8a5a00}
  .foot{margin-top:18px;font-size:11px;color:var(--muted);background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:11px 13px}
  .refresh{display:block;width:100%;margin-top:16px;padding:13px;border:0;border-radius:14px;background:linear-gradient(180deg,var(--grad-top),var(--grad-bot));color:#fff;font-size:15px;font-weight:700;box-shadow:0 4px 12px var(--glow),inset 0 2px 4px rgba(255,255,255,.35),inset 0 -2px 4px rgba(0,0,0,.08);text-shadow:0 1px 1px rgba(0,0,0,.15)}
  .refresh:active{transform:translateY(1px)}
  .mimicbtn{margin-top:8px;padding:8px 16px;border:none;border-radius:20px;background:linear-gradient(180deg,var(--grad-top),var(--grad-bot));color:#fff;font-size:13px;font-weight:600;box-shadow:0 4px 12px var(--glow),inset 0 2px 4px rgba(255,255,255,.35),inset 0 -2px 4px rgba(0,0,0,.08);text-shadow:0 1px 1px rgba(0,0,0,.15)}
  .mimicbtn:active{transform:translateY(1px)}
  .labtabs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 8px}
  .labtab{padding:7px 11px;border:1.5px solid var(--line);border-radius:18px;background:var(--bg-input);color:var(--muted);font-size:11.5px;font-weight:700;cursor:pointer}
  .labtab.active{background:linear-gradient(180deg,var(--grad-top),var(--grad-bot));color:#fff;border-color:transparent;box-shadow:0 3px 10px var(--glow)}
  .labgame{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .gtoggle{padding:5px 11px;border:1.5px solid var(--line);border-radius:14px;background:var(--bg-input);color:var(--muted);font-size:11.5px;font-weight:700;cursor:pointer}
  .gtoggle.active{background:var(--panel);color:var(--deep);border-color:var(--line2)}
  table.lab{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}
  table.lab th{text-align:left;color:var(--muted);font-weight:700;border-bottom:1.5px solid var(--line);padding:5px 3px}
  table.lab td{padding:5px 3px;border-bottom:1px solid var(--line);vertical-align:top}
  table.lab td.n{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  .verdict{margin-top:9px;padding:8px 11px;border-radius:10px;font-size:12px;font-weight:700}
  .verdict.pass{background:#e8f7ee;color:#1c7a4a;border:1.5px solid #b6e6c9}
  .verdict.warn{background:#fff9e6;color:#7a5b00;border:1.5px solid #ffe08a}
  .labinput{padding:8px 10px;border:1.5px solid var(--line);border-radius:10px;background:var(--bg-input);font-size:13px;width:100%;color:var(--plum)}
  .labrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0}
  .tik{font-variant-numeric:tabular-nums;font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:3px 7px;margin:2px}
  .labnote{margin-top:11px;font-size:12px;color:#274436;background:var(--panel);border-radius:10px;padding:11px 13px;border:1.5px solid var(--line)}
  .labnote code{background:var(--bg-input);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:11px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 100 100"><rect x="8" y="8" width="84" height="84" rx="20" fill="#fff"/><g fill="#2E9A63"><circle cx="32" cy="32" r="8"/><circle cx="68" cy="32" r="8"/><circle cx="50" cy="50" r="8"/><circle cx="32" cy="68" r="8"/><circle cx="68" cy="68" r="8"/></g></svg></div>
    <div><h1>Sara's Luck</h1><p class="sub">Powerball &amp; Lotto America</p></div>
  </header>
  <div class="status" id="status">loading…</div>
  <div id="games"></div>

  <div class="card" id="lab">
    <div class="game" style="display:flex;align-items:center;gap:6px">🔬 Thesis Lab</div>
    <p class="sub" style="margin:4px 0 0">Runs live on the real draw history — no black boxes.</p>
    <div class="labtabs">
      <button class="labtab active" data-t="rng">Randomness</button>
      <button class="labtab" data-t="ev">EV</button>
      <button class="labtab" data-t="wheel">Wheel</button>
      <button class="labtab" data-t="bt">Walk-forward</button>
      <button class="labtab" data-t="chrono">Chrono mimic</button>
      <button class="labtab" data-t="intel">🧠 Intel</button>
      <button class="labtab" data-t="crack">Real crack</button>
    </div>
    <div class="labgame"><span>Data set:</span>
      <button class="gtoggle active" data-g="powerball">Powerball</button>
      <button class="gtoggle" data-g="lottoAmerica">Lotto America</button>
    </div>
    <div id="labbody"></div>
  </div>

  <div class="card" id="anomalycard" style="display:none">
    <div class="game">🎯 The one anomaly</div>
    <div class="foot" id="anomalybody" style="margin-top:10px;border:none;padding:0;background:transparent"></div>
  </div>

  <div class="card" id="learnercard">
    <div class="game">🤖 Autonomous learner</div>
    <div class="foot" id="learnerbody" style="margin-top:10px;border:none;padding:0;background:transparent">connecting to the live feed…</div>
  </div>

  <button class="refresh" id="refreshBtn">↻ Refresh now</button>
  <div class="foot" id="foot"></div>
</div>

<script src="history.js"></script>
<script>
/* ---- bundled seed data (self-updater refreshes Powerball on launch) ---- */
const SEED = {
  taxes:{ okTopRate:0.045, fed:[[0,0.10],[12400,0.12],[50400,0.22],[105700,0.24],[201775,0.32],[256225,0.35],[640600,0.37]] },
  powerball:{ name:"Powerball", matrix:"5 of 69 + 1 of 26", odds:292201338, method:"physical ball machine (Tallahassee FL)",
    drawDays:[1,3,6], h:21, m:59, advertisedAnnuity:397000000, cashLumpSum:194700000, draws:1377, windowStart:"since 2015 matrix",
    ticketData:{white:[21,27,28,61,64],special:14}, ticketEdge:{white:[21,28,52,61,64],special:14}, sp:"PB", cls:"red", live:false, dataThrough:"2026-07-06" },
  lottoAmerica:{ name:"Lotto America", matrix:"5 of 52 + 1 of 10", odds:25989600, method:"certified RNG (Johnston IA) since 2023",
    drawDays:[1,3,6], h:21, m:15, advertisedAnnuity:2050000, cashLumpSum:1025000, draws:505, windowStart:"RNG era only",
    ticketData:{white:[8,9,15,42,51],special:4}, ticketEdge:{white:[5,8,42,47,51],special:4}, sp:"SB", cls:"gold", live:false, dataThrough:"2026-07-06" },
  updated:"bundled 2026-07-01"
};
let DATA = JSON.parse(JSON.stringify(SEED));
try{ const c=localStorage.getItem('saraLuck'); if(c){const p=JSON.parse(c);
  if(p&&p.powerball&&(p.powerball.draws||0)>=SEED.powerball.draws){ DATA=Object.assign(DATA,p); DATA.taxes=SEED.taxes; } } }catch(e){}

const money=n=>'$'+Math.round(n).toLocaleString('en-US');
const moneyM=n=>'$'+(n/1e6).toLocaleString('en-US',{maximumFractionDigits:2})+'M';
function fedTax(x){const b=DATA.taxes.fed;let t=0;for(let i=0;i<b.length;i++){const lo=b[i][0],r=b[i][1],hi=i+1<b.length?b[i+1][0]:Infinity;if(x>lo)t+=(Math.min(x,hi)-lo)*r;else break;}return t;}
function net(cash){const f=fedTax(cash),o=cash*DATA.taxes.okTopRate;return{net:cash-f-o,f,o};}
function nextDraw(days,h,m,afterISO){const now=new Date();let floor=now.getTime();if(afterISO){const p=String(afterISO).split('-');if(p.length===3){const lt=new Date(+p[0],+p[1]-1,+p[2],h,m,30,0).getTime();if(lt>floor)floor=lt;}}const base=new Date(floor);let d=base;for(let i=0;i<21;i++){d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i,h,m,0,0);if(days.includes(d.getDay())&&d.getTime()>floor)return d;}return d;}
function left(ms){if(ms<0)ms=0;const s=Math.floor(ms/1000),dd=Math.floor(s/86400),hh=Math.floor(s%86400/3600),mm=Math.floor(s%3600/60),ss=s%60;return (dd?dd+'d ':'')+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function balls(t,cls){let h='<div class="balls">';t.white.forEach(n=>h+=`<span class="ball">${n}</span>`);h+=`<span class="plus">+</span><span class="ball ${cls}">${t.special}</span></div>`;return h;}

function ageOn(y,mo,d){const now=new Date();let a=now.getFullYear()-y;if(now<new Date(now.getFullYear(),mo-1,d))a--;return a;}
function myLineFor(gkey){ if(gkey==='powerball') return {white:[3,9,22,65,67],special:4}; return {white:[3,9,22,ageOn(1990,8,21),ageOn(1981,9,29)].sort((a,b)=>a-b),special:4}; }
const PAYOUTS={
  powerball:{sp:'PB',price:2,jodds:292201338,mult:{name:'Power Play',cost:1,vals:'2×/3×/4×/5×/10×',max:10},
    fixed:[['5',1000000,11688054],['4 + PB',50000,913129],['4',100,36525],['3 + PB',100,14494],['3',7,580],['2 + PB',7,701],['1 + PB',4,92],['PB only',4,38]]},
  lottoAmerica:{sp:'SB',price:1,jodds:25989600,mult:{name:'All Star Bonus',cost:1,vals:'2×/3×/4×/5×',max:5},
    fixed:[['5',20000,2887733],['4 + SB',1000,110594],['4',100,12288],['3 + SB',20,2404],['3',5,267],['2 + SB',5,160],['1 + SB',2,29],['SB only',2,17]]}
};
function payoutTable(gkey,g){
  const P=PAYOUTS[gkey]; if(!P) return '';
  const t=net(g.cashLumpSum);
  let rows='<tr><td>5 + '+P.sp+'</td><td class="n">Jackpot</td><td class="n">'+moneyM(g.cashLumpSum)+' → <b>'+money(t.net)+'</b> net</td><td class="n">1 in '+P.jodds.toLocaleString()+'</td></tr>';
  P.fixed.forEach((r,i)=>{const label=r[0],base=r[1],odds=r[2];const mx=(gkey==='powerball'&&i===0)?'$2,000,000':'up to $'+(base*P.mult.max).toLocaleString();rows+='<tr><td>'+label+'</td><td class="n">$'+base.toLocaleString()+'</td><td class="n">'+mx+'</td><td class="n">1 in '+odds.toLocaleString()+'</td></tr>';});
  return '<details class="ticket" style="margin-top:0;padding:11px 12px"><summary style="cursor:pointer;font-weight:600;color:var(--deep)">💰 All prize tiers &amp; payouts</summary>'+
    '<table class="lab" style="margin-top:8px"><thead><tr><th>match</th><th class="n">base</th><th class="n">w/ '+P.mult.name+'</th><th class="n">odds</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="tag" style="margin-top:6px">Base line $'+P.price+'. <b>'+P.mult.name+'</b> (+$'+P.mult.cost+'/play) multiplies every non-jackpot prize by the '+P.mult.vals+' drawn each game — the jackpot is never multiplied'+(gkey==='powerball'?', and Match-5 is a flat $2,000,000 with any Power Play (10× only when the jackpot is ≤ $150M)':'')+'. Verified against the official '+(gkey==='powerball'?'powerball.com':'lottoamerica.com')+' chart. Top row = cash option after all taxes.</div>'+
    '</details>';
}
const PRIZE_TAB={ powerball:{'5,1':'jackpot','5,0':1000000,'4,1':50000,'4,0':100,'3,1':100,'3,0':7,'2,1':7,'1,1':4,'0,1':4},
                  lottoAmerica:{'5,1':'jackpot','5,0':20000,'4,1':1000,'4,0':100,'3,1':20,'3,0':5,'2,1':5,'1,1':2,'0,1':2} };
const prizeFor=(gkey,wm,sp)=> PRIZE_TAB[gkey][wm+','+(sp?1:0)] || 0;
function lineRecord(line,gkey){
  const H=(DATA[gkey]&&DATA[gkey].history)||(window.LOTTO_HISTORY&&window.LOTTO_HISTORY[gkey])||[];
  const price=gkey==='powerball'?2:1, whites=new Set(line.white);
  let won=0,best=0,jackpots=0,hits=0; const wins=[];
  for(let i=0;i<H.length;i++){ const row=H[i]; let wm=0; for(let k=0;k<5;k++) if(whites.has(row[k])) wm++; const sp=(line.special===row[5]);
    if(wm>best)best=wm; if(wm===5&&sp)jackpots++;
    const pr=prizeFor(gkey,wm,sp); if(pr){ hits++; if(pr!=='jackpot')won+=pr; wins.push({i,wm,sp,prize:pr}); } }
  const spent=H.length*price; return {draws:H.length,won,spent,best,jackpots,hits,wins};
}
function tierLabel(gkey,wm,sp){ const s=gkey==='powerball'?'PB':'SB'; return wm===0?s:(wm+(sp?' + '+s:'')); }
function linesLeaderboard(gkey){
  const g=DATA[gkey]; if(!g) return '';
  const dates=(g.historyDates)||(window.LOTTO_HISTORY_DATES&&window.LOTTO_HISTORY_DATES[gkey])||[];
  const listed=[['My Line',myLineFor(gkey)]];
  if(g.ticketFusion) listed.push(['Best ticket',g.ticketFusion]);
  if(g.ticketEdge) listed.push(['Edge pick',g.ticketEdge]);
  const rows=[], allWins=[];
  for(const [name,line] of listed){ const r=lineRecord(line,gkey); rows.push({name,r}); r.wins.forEach(w=>allWins.push({date:dates[w.i]||'',name,line,...w})); }
  if(!rows.length||!rows[0].r.draws) return '';
  allWins.sort((a,b)=> a.date<b.date?1:(a.date>b.date?-1:0));
  const ranked=rows.slice().sort((a,b)=>(b.r.won-b.r.spent)-(a.r.won-a.r.spent)||b.r.hits-a.r.hits);
  let h='<table class="lab" style="margin-top:6px"><thead><tr><th>line</th><th class="n">hits</th><th class="n">$ won</th><th class="n">net $</th><th class="n">best</th></tr></thead><tbody>'+
    rows.map(r=>{const net=r.r.won-r.r.spent;return '<tr><td>'+r.name+'</td><td class="n">'+r.r.hits+'</td><td class="n">$'+r.r.won.toLocaleString()+'</td><td class="n" style="color:'+(net>0?'var(--good)':'var(--red)')+'">'+(net>=0?'+$':'−$')+Math.abs(net).toLocaleString()+'</td><td class="n">'+r.r.best+'/5</td></tr>';}).join('')+'</tbody></table>';
  if(allWins.length){ h+='<div style="font-size:11px;margin-top:5px"><b>🏆 Wins log</b> — '+allWins.length+' winning draws, newest first:</div><div style="font-size:11px;max-height:150px;overflow:auto;margin-top:2px">'+
    allWins.slice(0,20).map(w=>'<div style="padding:2px 0;border-bottom:1px solid var(--line)">'+(w.date||'—')+' · <b>'+w.name+'</b> · '+tierLabel(gkey,w.wm,w.sp)+' · <b>'+(w.prize==='jackpot'?'JACKPOT 🎉':'$'+w.prize.toLocaleString())+'</b> <span style="color:var(--muted)">['+w.line.white.join(' ')+' + '+w.line.special+']</span></div>').join('')+
    (allWins.length>20?'<div style="color:var(--muted);padding-top:2px">…and '+(allWins.length-20)+' more</div>':'')+'</div>'; }
  else h+='<div style="font-size:11px;color:var(--muted);margin-top:5px">No prize-winning draws yet for these lines.</div>';
  const top=ranked[0];
  h+='<div style="font-size:11px;color:var(--muted);margin-top:5px"><b>Best line so far:</b> '+top.name+'. It does NOT tell you what to play: all are fixed sets at the same 1 in '+g.odds.toLocaleString()+' odds — the gaps are luck, past hits don’t predict. Real levers: more DIFFERENT lines + the better-odds game. Best ticket = most winner-<i>like</i>, not more likely.</div>';
  return h;
}
function lineRecordLine(line,gkey,gname){
  const r=lineRecord(line,gkey); if(!r.draws) return '';
  return '<div class="tag" style="margin-top:6px;color:var(--deep)">📊 <b>All-time record</b> vs every real '+gname+' draw ('+r.draws.toLocaleString()+' draws): won <b>$'+r.won.toLocaleString()+'</b> on $'+r.spent.toLocaleString()+' ('+(r.spent?((r.won/r.spent-1)*100).toFixed(0):0)+'% ROI), hit a prize <b>'+r.hits+'</b>×, best <b>'+r.best+'/5</b>'+(r.jackpots?' + special 🎉':'')+'. A fixed line — a fair lifetime tally, same odds going forward.</div>';
}
function card(g,gkey){
  const nd=nextDraw(g.drawDays,g.h,g.m,g.dataThrough), t=net(g.cashLumpSum);
  const pw=g.sp==='PB'?69:52, ps=g.sp==='PB'?26:10;
  const H=(DATA[gkey]&&DATA[gkey].history)||(window.LOTTO_HISTORY&&window.LOTTO_HISTORY[gkey])||[];
  const ldr=H.length?H[H.length-1]:null;
  return `<div class="card" data-d="${g.drawDays}" data-h="${g.h}" data-m="${g.m}" data-through="${g.dataThrough||''}">
    <div class="ct"><span class="game">${g.name}</span><span class="matrix">${g.matrix}</span></div>

  function panelEV(k){
    const M=META[k],cash=DATA[k].cashLumpSum||0;
    let fixed=0;M.fixed.forEach(function(p){fixed+=p[0]/p[1];});
    const t=net(cash),jEVgross=cash/M.jodds,jEVnet=t.net/M.jodds,totNet=fixed+jEVnet,breakeven=(M.price-fixed)*M.jodds;
    return '<p class="sub" style="margin:0 0 8px">EV of one $'+M.price+' ticket, using the <b>cash</b> value ('+moneyM(cash)+') + Oklahoma after-tax &mdash; not the advertised annuity.</p>'+
      '<table class="lab"><tbody>'+
      '<tr><td>Fixed (non-jackpot) prizes</td><td class="n">$'+fixed.toFixed(3)+'</td></tr>'+
      '<tr><td>Jackpot EV (cash, pre-tax)</td><td class="n">$'+jEVgross.toFixed(3)+'</td></tr>'+
      '<tr><td>Jackpot EV (cash, after tax)</td><td class="n">$'+jEVnet.toFixed(3)+'</td></tr>'+
      '<tr><td><b>Total EV / ticket</b></td><td class="n"><b>$'+totNet.toFixed(3)+'</b> vs $'+M.price+'</td></tr>'+
      '</tbody></table>'+
      '<div class="verdict '+(totNet>=M.price?'pass':'warn')+'">'+(totNet>=M.price?'+EV now (rare) &mdash; still a long-odds gamble.':'Negative EV. You keep ~'+(totNet/M.price*100).toFixed(0)+'&cent; per dollar.')+'</div>'+
      '<div class="labnote">Gross break-even &asymp; '+moneyM(breakeven)+' cash; after tax the real threshold is ~'+moneyM(breakeven/0.585)+' cash (not the advertised annuity), which after tax these games essentially never clear. The one historical +EV window was Cash WinFall&rsquo;s rolldown &mdash; neither game has one.</div>';
  }

  function panelWheel(k){
    const M=META[k];
    return '<p class="sub" style="margin:0 0 8px">A real <b>covering design</b>: enter 6&ndash;12 white numbers (1&ndash;'+M.pool+'). It builds the fewest tickets that <b>guarantee a 3-match if any 3 of your numbers are drawn</b>.</p>'+
      '<div class="labrow"><input class="labinput" id="wheelin" placeholder="e.g. 5, 8, 21, 28, 42, 52, 61, 64"></div>'+
      '<div class="labrow"><button class="mimicbtn" id="wheelgo">build the wheel</button></div>'+
      '<div id="wheelout"></div>';
  }
  function buildWheel(){
    const M=META[GAME],raw=(document.getElementById('wheelin').value||'').split(/[^0-9]+/).map(Number).filter(x=>x>=1&&x<=M.pool);
    let nums=[...new Set(raw)].sort((a,b)=>a-b);const out=document.getElementById('wheelout');
    if(nums.length<6){out.innerHTML='<div class="verdict warn">Enter at least 6 distinct numbers (1&ndash;'+M.pool+').</div>';return;}
    if(nums.length>12)nums=nums.slice(0,12);
    const comb=(arr,r)=>{const res=[];(function rec(s,c){if(c.length===r){res.push(c.slice());return;}for(let i=s;i<arr.length;i++){c.push(arr[i]);rec(i+1,c);c.pop();}})(0,[]);return res;};
    const need=new Set(comb(nums,3).map(t=>t.join('-')));const total=need.size;
    const fives=comb(nums,5),tickets=[];
    while(need.size>0&&tickets.length<300){let best=null,bc=-1;for(const f of fives){let cov=0;for(const t of comb(f,3))if(need.has(t.join('-')))cov++;if(cov>bc){bc=cov;best=f;}}if(bc<=0)break;tickets.push(best);for(const t of comb(best,3))need.delete(t.join('-'));}
    const cost=tickets.length*M.price;
    out.innerHTML='<div class="verdict pass">'+tickets.length+' tickets cover all '+total+' of your 3-number combos &rarr; guaranteed &ge; one 3-match if any 3 of your '+nums.length+' numbers hit. Cost: $'+cost+'.</div>'+
      '<div class="labrow">'+tickets.map(t=>'<span class="tik">'+t.join('  ')+'</span>').join('')+'</div>'+
      '<div class="labnote">Pick your '+M.sp+' separately. A 3-match pays a small fixed prize &mdash; a wheel <i>guarantees</i> low-tier structure, it is not profit. This is the real math behind &ldquo;lottery wheels.&rdquo;</div>';
  }

  function panelBT(k){
    return '<p class="sub" style="margin:0 0 8px">Walk-forward: build tickets from <b>only the past</b>, score against the real draw. The honest backtest.</p>'+
      '<div class="labrow"><span class="sub">Method:</span>'+
      '<select class="labinput" id="btmethod" style="width:auto;flex:1"><option value="edge">edge (hot-weighted)</option><option value="hot">most-drawn</option><option value="random">random</option><option value="cold">cold / due</option></select></div>'+
      '<div class="labrow"><span class="sub">Tickets/draw:</span>'+
      '<select class="labinput" id="bttix" style="width:auto"><option>1</option><option>50</option><option>500</option></select>'+
      '<button class="mimicbtn" id="btgo">run</button></div>'+
      '<div id="btout"></div>';
  }
  function runBT(){
    const k=GAME,M=META[k],H=hist(k),n=H.length,warm=Math.min(200,Math.floor(n/3));
    const method=document.getElementById('btmethod').value,T=+document.getElementById('bttix').value;
    const out=document.getElementById('btout');
    if(n<50){out.innerHTML='<div class="verdict warn">No draw history loaded.</div>';return;}
    out.innerHTML='<p class="sub">crunching '+((n-warm)*T).toLocaleString()+' tickets&hellip;</p>';
    setTimeout(function(){
      const freq=new Array(M.pool).fill(0);for(let i=0;i<warm;i++)for(let j=0;j<5;j++)freq[H[i][j]-1]++;
      const wfun={edge:f=>f.map(v=>(v+1)*(v+1)),hot:f=>f.map(v=>Math.pow(v+1,4)),random:f=>f.map(()=>1),cold:f=>{const mx=Math.max.apply(null,f);return f.map(v=>mx+1-v);}}[method];
      let tested=0,matchSum=0,h3=0,h4=0,h5=0,won=0,drawsHit=0;
      for(let t=warm;t<n;t++){
        const act=new Set(H[t].slice(0,5)),w=wfun(freq),cum=[];let s=0;for(const x of w){s+=x;cum.push(s);}
        let drawBest=0;
        for(let m=0;m<T;m++){const set=new Set();while(set.size<5){const r=Math.random()*s;let lo=0,hi=M.pool-1;while(lo<hi){const mid=(lo+hi)>>1;if(cum[mid]<r)lo=mid+1;else hi=mid;}set.add(lo+1);}
          let ov=0;for(const x of set)if(act.has(x))ov++;if(T===1)matchSum+=ov;if(ov>drawBest)drawBest=ov;if(ov>=3){won+=M.prizes[ov]||0;if(ov===3)h3++;else if(ov===4)h4++;else h5++;}}
        if(drawBest>=3)drawsHit++;
        for(let j=0;j<5;j++)freq[H[t][j]-1]++;tested++;
      }
      const spent=tested*T*M.price,net2=won-spent,avg=(T===1)?(matchSum/tested):null;
      out.innerHTML='<table class="lab"><tbody>'+
        '<tr><td>Draws tested</td><td class="n">'+tested+'</td></tr>'+
        (avg!=null?'<tr><td>Avg matched / draw</td><td class="n">'+avg.toFixed(3)+' of 5</td></tr>':'')+
        '<tr><td>Draws with a 3+ match</td><td class="n">'+drawsHit+' ('+(drawsHit/tested*100).toFixed(0)+'%)</td></tr>'+
        '<tr><td>3 / 4 / 5-hits</td><td class="n">'+h3+' / '+h4+' / '+h5+'</td></tr>'+
        '<tr><td>Won &minus; spent</td><td class="n">$'+won.toLocaleString()+' &minus; $'+spent.toLocaleString()+'</td></tr>'+
        '<tr><td><b>Net</b></td><td class="n"><b style="color:'+(net2>=0?'var(--good)':'var(--red)')+'">$'+net2.toLocaleString()+'</b></td></tr>'+
        '</tbody></table>'+
        '<div class="labnote">'+(T===1?'One ticket/draw averages ~'+avg.toFixed(2)+'/5 &mdash; same as random, any method. ':'Buying '+T+'/draw hits 3+ &ldquo;often,&rdquo; but look at the net. ')+'The net stays red. That&rsquo;s the whole thesis in one panel. (Sim scores white balls only &mdash; special-ball tiers excluded, so real returns run slightly higher; the conclusion is unchanged.)</div>';
    },30);
  }

  function panelChrono(k){
    return '<p class="sub" style="margin:0 0 8px">A mimic that walks every draw <b>in chronological order</b> and predicts the next. Built and tested honestly.</p>'+
      '<div class="labrow"><button class="mimicbtn" id="chronogo">run the chronological mimic</button></div>'+
      '<div id="chronoout"></div>';
  }
  function runChrono(){
    const k=GAME,M=META[k],H=hist(k),n=H.length,warm=Math.min(200,Math.floor(n/3));
    const out=document.getElementById('chronoout');
    if(n<50){out.innerHTML='<div class="verdict warn">No draw history loaded.</div>';return;}
    out.innerHTML='<p class="sub">walking '+(n-warm)+' draws in time order&hellip;</p>';
    setTimeout(function(){
      const L=Math.exp(-0.02),w=new Array(M.pool).fill(0);
      for(let i=0;i<warm;i++){for(let j=0;j<M.pool;j++)w[j]*=L;for(let j=0;j<5;j++)w[H[i][j]-1]+=1;}
      const top5=()=>w.map((v,i)=>[i+1,v]).sort((a,b)=>b[1]-a[1]||a[0]-b[0]).slice(0,5).map(x=>x[0]);
      /* control B = EXACT expected overlap vs a random past draw = sum(freq[pick])/n. Closed-form, no Monte-Carlo noise. */
      const fullFreq=new Array(M.pool+1).fill(0); for(let i=0;i<n;i++)for(let j=0;j<5;j++)fullFreq[H[i][j]]++;
      let A=0,B=0,c=0;
      for(let t=warm;t<n;t++){
        const pred=top5(),act=new Set(H[t].slice(0,5));
        let ov=0;for(const x of pred)if(act.has(x))ov++;A+=ov;
        let bexp=0;for(const x of pred)bexp+=fullFreq[x]/n;B+=bexp;c++;
        for(let j=0;j<M.pool;j++)w[j]*=L;for(let j=0;j<5;j++)w[H[t][j]-1]+=1;
      }
      A/=c;B/=c;const uni=25/M.pool,gap=A-B,noEdge=gap<=0.03;
      out.innerHTML='<table class="lab"><tbody>'+
        '<tr><td>Uniform baseline (any fixed 5)</td><td class="n">'+uni.toFixed(3)+'</td></tr>'+
        '<tr><td><b>Mimic vs the TRUE next draw</b></td><td class="n"><b>'+A.toFixed(3)+'</b></td></tr>'+
        '<tr><td>Same picks vs a RANDOM draw (exact)</td><td class="n">'+B.toFixed(3)+'</td></tr>'+
        '</tbody></table>'+
        '<div class="verdict '+(noEdge?'warn':'pass')+'">Scores <b>'+A.toFixed(2)+'</b> vs the next draw and <b>'+B.toFixed(2)+'</b> vs a random unrelated draw '+(gap<=0?'(a touch <i>worse</i> than random). ':'(about the same). ')+(noEdge?'<b>No temporal edge:</b> NOT predicting the next draw':'A real gap &mdash; investigate')+' &mdash; just commonly-drawn numbers that match <i>any</i> draw equally.</div>'+
        '<div class="labnote">The honest answer to &ldquo;a mimic that predicts as it walks chronologically.&rdquo; Independent draws carry no order information (lag-1 info = 0), so the best autoregressive model matches the next draw no better than a draw years away. A perfect mimic of a random process is, necessarily, random. (8 model families tested vs a time-shuffled control &mdash; none beat it.)</div>';
    },30);
  }

  function intelMean(a){return a.reduce((x,y)=>x+y,0)/a.length;}
  function intelSd(a){const m=intelMean(a);return Math.sqrt(intelMean(a.map(x=>(x-m)**2)))||1;}
  function intelPairs(w){const r=[];for(let i=0;i<w.length;i++)for(let j=i+1;j<w.length;j++)r.push(w[i]+'-'+w[j]);return r;}
  function buildIntel(k){
    const H=hist(k),M=META[k],n=H.length; if(n<50)return null;
    const wf=new Array(M.pool+1).fill(0),pf=new Array(M.spool+1).fill(0),pair={};
    const sums=[],odds=[],lows=[],spreads=[]; const half=Math.floor(M.pool/2);
    H.forEach(row=>{const w=row.slice(0,5).slice().sort((a,b)=>a-b);w.forEach(x=>wf[x]++);if(row[5]>=1)pf[row[5]]++;intelPairs(w).forEach(p=>pair[p]=(pair[p]||0)+1);sums.push(w[0]+w[1]+w[2]+w[3]+w[4]);odds.push(w.filter(x=>x%2).length);lows.push(w.filter(x=>x<=half).length);spreads.push(w[4]-w[0]);});
    const P={sum:[intelMean(sums),intelSd(sums)],odd:[intelMean(odds),intelSd(odds)],low:[intelMean(lows),intelSd(lows)],spread:[intelMean(spreads),intelSd(spreads)]};
    const wfN=wf.slice(1),wm=intelMean(wfN),ws=intelSd(wfN),pairVals=Object.values(pair);
    const hotW=wf.map((v,i)=>[i,v]).slice(1).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const hotS=pf.map((v,i)=>[i,v]).slice(1).sort((a,b)=>b[1]-a[1]).slice(0,4);
    return {k,M,n,wf,pf,pair,P,wm,ws,pairVals,hotW,hotS,half};
  }
  function intelScore(I,w,s){
    const so=w.slice().sort((a,b)=>a-b),sum=so[0]+so[1]+so[2]+so[3]+so[4];
    const zd=(v,p)=>Math.abs((v-p[0])/p[1]);
    const shape=(zd(sum,I.P.sum)+zd(so.filter(n=>n%2).length,I.P.odd)+zd(so.filter(n=>n<=I.half).length,I.P.low)+zd(so[4]-so[0],I.P.spread))/4;
    const typ=100*Math.exp(-shape);
    const hotZ=intelMean(so.map(n=>(I.wf[n]-I.wm)/I.ws));
    const pairAvg=intelMean(intelPairs(so).map(p=>I.pair[p]||0));
    const pairPct=100*I.pairVals.filter(v=>v<=pairAvg).length/I.pairVals.length;
    const over=so.filter(n=>n>31).length;
    const pim=0.4*typ+0.35*Math.min(100,Math.max(0,50+15*hotZ))+0.25*pairPct;
    return {pim:+pim.toFixed(1),typ:+typ.toFixed(0),hotZ:+hotZ.toFixed(2),pairPct:+pairPct.toFixed(0),over,sum,odd:so.filter(n=>n%2).length};
  }
  function panelIntel(k){
    const I=buildIntel(k); if(!I)return '<div class="verdict warn">No draw history loaded.</div>';
    window.__intel=I;
    const dflt=(DATA[k].ticketFusion?DATA[k].ticketFusion.white.join(' ')+' '+DATA[k].ticketFusion.special:'');
    return '<p class="sub" style="margin:0 0 8px">Intelligence Model over all '+I.n+' draws: frequency, shapes, pairs, spacing. Enter any ticket for its <b>historical-similarity score</b>. <b>Honest:</b> a high score does NOT raise your odds &mdash; it is descriptive, not predictive (tested: a top-similarity ticket matches the next draw no better than a random one).</p>'+
      '<div class="labnote" style="margin-top:0"><b>Game fingerprint:</b> typical sum '+I.P.sum[0].toFixed(0)+'&plusmn;'+I.P.sum[1].toFixed(0)+', '+I.P.odd[0].toFixed(1)+'/5 odd, '+I.P.low[0].toFixed(1)+'/5 low. Hottest: '+I.hotW.map(x=>x[0]).join(' ')+' &middot; special '+I.hotS.map(x=>x[0]).join(' ')+'.</div>'+
      '<div class="labrow"><input class="labinput" id="intelin" value="'+dflt+'" placeholder="5 whites then special"></div>'+
      '<div class="labrow"><button class="mimicbtn" id="intelgo">score this ticket</button></div>'+
      '<div id="intelout"></div>';
  }
  function runIntel(){
    const I=window.__intel; const raw=(document.getElementById('intelin').value||'').split(/[^0-9]+/).map(Number).filter(x=>x>0);
    const out=document.getElementById('intelout'); const w=raw.slice(0,5),s=raw[5]||I.hotS[0][0];
    if(w.length<5||new Set(w).size<5||w.some(n=>n>I.M.pool)){out.innerHTML='<div class="verdict warn">Enter 5 distinct whites (1&ndash;'+I.M.pool+') then the special.</div>';return;}
    const r=intelScore(I,w,s);
    const band=r.pim>=62?'high &mdash; very typical + hot':r.pim>=52?'solid &mdash; normal-looking':'low &mdash; unusual shape';
    out.innerHTML='<table class="lab"><tbody>'+
      '<tr><td><b>PIM similarity score</b></td><td class="n"><b>'+r.pim+'/100</b></td></tr>'+
      '<tr><td>Typicality</td><td class="n">'+r.typ+'/100 ('+band+')</td></tr>'+
      '<tr><td>Hotness (freq z)</td><td class="n">'+(r.hotZ>0?'+':'')+r.hotZ+'</td></tr>'+
      '<tr><td>Pair support</td><td class="n">'+r.pairPct+'th %ile</td></tr>'+
      '<tr><td>Shape</td><td class="n">sum '+r.sum+', '+r.odd+'/5 odd</td></tr>'+
      '</tbody></table>'+
      '<div class="labnote">Looks '+(r.pim>=52?'like a normal winning ticket':'unusual vs past winners')+' &mdash; interesting as analysis, but it changes nothing about the odds (every combination is equally likely). For the single highest-similarity never-drawn ticket, see the ★★ best ticket on the game card.</div>';
  }
  function panelCrack(){
    return '<div class="labnote" style="background:var(--bg-input);line-height:1.55">'+
      '<b>Is either game crackable? The honest answer.</b><br><br>'+
      '<b>From the numbers alone &mdash; no.</b> Both games are statistically indistinguishable from fair randomness. For independent draws, H(next | history) = H(next) &mdash; the past carries zero information. No model beats chance; the walk-forward proves it.<br><br>'+
      '<b>But this family <i>was</i> cracked once &mdash; from the inside.</b> Lotto America descends from MUSL&rsquo;s Hot Lotto. Eddie Tipton, MUSL&rsquo;s own security director, planted self-deleting code that made the RNG predictable on three dates a year, claiming jackpots until a $16.5M ticket unraveled it (convicted 2017). That is the one documented crack &mdash; an <b>insider/implementation attack</b>, not prediction from past draws.<br><br>'+
      '<b>The only real levers:</b> more distinct lines, the better-odds game, covering designs for guaranteed low-tier structure, and buying only when EV is closest. None predict the draw.<br><br>'+
      '<b>Pre-registered proof:</b> a fixed prediction is committed to the public data repo (<code>predictions.json</code>, commit <code>2af6f2c</code>) with a tamper-proof timestamp, locked before the draw. Over many draws it scores at chance &mdash; and that prospective null <i>is</i> the proof.</div>';
  }

  function render(){
    const b=document.getElementById('labbody');if(!b)return;
    document.querySelectorAll('.labgame').forEach(el=>el.style.display=(TAB==='crack')?'none':'flex');
    if(TAB==='rng')b.innerHTML=panelRNG(GAME);
    else if(TAB==='ev')b.innerHTML=panelEV(GAME);
    else if(TAB==='wheel'){b.innerHTML=panelWheel(GAME);document.getElementById('wheelgo').onclick=buildWheel;}
    else if(TAB==='bt'){b.innerHTML=panelBT(GAME);document.getElementById('btgo').onclick=runBT;}
    else if(TAB==='chrono'){b.innerHTML=panelChrono(GAME);document.getElementById('chronogo').onclick=runChrono;}
    else if(TAB==='intel'){b.innerHTML=panelIntel(GAME);document.getElementById('intelgo').onclick=runIntel;}
    else b.innerHTML=panelCrack();
  }
  document.querySelectorAll('.labtab').forEach(t=>t.onclick=function(){document.querySelectorAll('.labtab').forEach(x=>x.classList.remove('active'));t.classList.add('active');TAB=t.dataset.t;render();});
  document.querySelectorAll('.gtoggle').forEach(t=>t.onclick=function(){document.querySelectorAll('.gtoggle').forEach(x=>x.classList.remove('active'));t.classList.add('active');GAME=t.dataset.g;render();});
  render();
})();
</script>
